<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motion Image Demo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:sans-serif;
}

.hero{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* メイン画像 */
.hero img{

    position:absolute;
    width:110%;
    height:110%;
    left:-5%;
    top:-5%;

    object-fit:cover;

    animation:cameraMove 18s ease-in-out infinite alternate;

}

/* カメラワーク */
@keyframes cameraMove{

0%{
transform:scale(1) translate(0px,0px);
}

30%{
transform:scale(1.05) translate(-20px,-10px);
}

60%{
transform:scale(1.08) translate(15px,-15px);
}

100%{
transform:scale(1.12) translate(-30px,15px);
}

}

/* 光漏れ */
.light{

position:absolute;
width:60vw;
height:140vh;

top:-20vh;
left:-20vw;

background:radial-gradient(circle,
rgba(255,220,120,.25) 0%,
rgba(255,180,80,.12) 30%,
transparent 70%);

mix-blend-mode:screen;

animation:lightMove 15s linear infinite;

pointer-events:none;

}

@keyframes lightMove{

0%{
transform:translateX(-20vw) rotate(0deg);
opacity:.15;
}

50%{
opacity:.4;
}

100%{
transform:translateX(80vw) rotate(8deg);
opacity:.15;
}

}

/* フィルムグレイン */

.noise{

position:absolute;
inset:-50%;

background-image:

radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);

background-size:5px 5px;

opacity:.08;

animation:noiseMove .35s steps(3) infinite;

mix-blend-mode:soft-light;

pointer-events:none;

}

@keyframes noiseMove{

0%{
transform:translate(0,0);
}

25%{
transform:translate(-15px,8px);
}

50%{
transform:translate(10px,-10px);
}

75%{
transform:translate(-8px,-5px);
}

100%{
transform:translate(5px,12px);
}

}

/* 黒グラデーション */

.overlay{

position:absolute;
inset:0;

background:

linear-gradient(
to top,
rgba(0,0,0,.55),
rgba(0,0,0,.15),
rgba(0,0,0,.2)
);

}

/* テキスト */

.content{

position:absolute;

left:8%;
bottom:15%;

color:white;

z-index:10;

opacity:0;

transform:translateY(40px);

transition:2s;

}

.content.show{

opacity:1;

transform:translateY(0);

}

.content h1{

font-size:56px;
letter-spacing:4px;
margin-bottom:15px;

}

.content p{

font-size:20px;
opacity:.85;
line-height:1.8;

}

</style>

</head>
<body>

<div class="hero">

    <img src="sample.jpg">

    <div class="light"></div>

    <div class="noise"></div>

    <div class="overlay"></div>

    <div class="content">

        <h1>Motion Image</h1>

        <p>
            HTML + CSS + JavaScriptだけで<br>
            映像のような雰囲気を演出
        </p>

    </div>

</div>

<script>

window.onload=function(){

    document.querySelector(".content").classList.add("show");

};

/* マウスでほんの少しだけカメラが動く */

const img=document.querySelector("img");

document.addEventListener("mousemove",function(e){

    const x=(e.clientX/window.innerWidth-.5)*10;
    const y=(e.clientY/window.innerHeight-.5)*10;

    img.style.filter="brightness(1.02)";

    img.style.transform+=` translate(${x}px,${y}px)`;

});

</script>

</body>
</html>
